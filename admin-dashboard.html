<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Dashboard - Holliday's Lawn & Garden</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="assets/css/main.css?v=1.0.1" />
  <link rel="stylesheet" href="assets/css/admin.css?v=1.0.1" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
</head>
<body>
  <div class="dashboard-wrapper">
    <aside class="sidebar">
      <div class="logo">
        <img src="assets/images/logo.png" alt="Holliday's Lawn & Garden" />
      </div>
      <nav>
        <ul>
          <li><a href="#admin-dashboard"><i class="fas fa-home"></i> Dashboard</a></li>
          <li><a href="#users"><i class="fas fa-users"></i> Users</a></li>
          <li><a href="#services"><i class="fas fa-leaf"></i> Services</a></li>
          <li><a href="#payments"><i class="fas fa-credit-card"></i> Payments</a></li>
          <li><a href="#messages"><i class="fas fa-envelope"></i> Messages</a></li>
          <li><a href="#documents"><i class="fas fa-file-alt"></i> Documents</a></li>
        </ul>
      </nav>
      <button class="logout-btn" onclick="logout()">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </aside>
    <main class="dashboard-main">
      <div class="dashboard-header">
        <h1 class="greeting">Welcome, Admin!</h1>
      </div>
      <section id="admin-dashboard" class="feature-section">
        <h2>Overview</h2>
        <div id="admin-overview"></div>
      </section>
      <section id="users" class="feature-section" style="display: none;">
        <h2>Users</h2>
        <div id="users-container"></div>
      </section>
      <section id="services" class="feature-section" style="display: none;">
        <h2>Services</h2>
        <div id="admin-services-container"></div>
      </section>
      <section id="payments" class="feature-section" style="display: none;">
        <h2>Payments</h2>
        <div id="admin-payments-container"></div>
      </section>
      <section id="messages" class="feature-section" style="display: none;">
        <h2>Messages</h2>
        <div id="admin-messages-container"></div>
      </section>
      <section id="documents" class="feature-section" style="display: none;">
        <h2>Documents</h2>
        <div id="admin-documents-container"></div>
      </section>
    </main>
  </div>

  <!-- Modals -->
  <div id="addUserModal" class="modal" style="display: none;">
    <div class="modal-content">
      <h3>Add New User</h3>
      <form id="addUserForm">
        <div class="form-group">
          <label for="userName">Full Name</label>
          <input type="text" id="userName" required>
        </div>
        <div class="form-group">
          <label for="userEmail">Email</label>
          <input type="email" id="userEmail" required>
        </div>
        <div class="form-group">
          <label for="userPhone">Phone</label>
          <input type="tel" id="userPhone" required>
        </div>
        <div class="form-group">
          <label for="userPassword">Password</label>
          <input type="password" id="userPassword" required>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-primary">Add User</button>
          <button type="button" class="btn-secondary" onclick="closeModal('addUserModal')">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <div id="addServiceModal" class="modal" style="display: none;">
    <div class="modal-content">
      <h3>Add New Service</h3>
      <form id="addServiceForm">
        <div class="form-group">
          <label for="serviceName">Service Name</label>
          <input type="text" id="serviceName" required>
        </div>
        <div class="form-group">
          <label for="servicePrice">Price</label>
          <input type="number" id="servicePrice" step="0.01" required>
        </div>
        <div class="form-group">
          <label for="serviceDuration">Duration (hours)</label>
          <input type="number" id="serviceDuration" required>
        </div>
        <div class="form-group">
          <label for="serviceDescription">Description</label>
          <textarea id="serviceDescription" required></textarea>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-primary">Add Service</button>
          <button type="button" class="btn-secondary" onclick="closeModal('addServiceModal')">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <div id="uploadDocumentModal" class="modal" style="display: none;">
    <div class="modal-content">
      <h3>Upload Document</h3>
      <form id="uploadDocumentForm">
        <div class="form-group">
          <label for="documentName">Document Name</label>
          <input type="text" id="documentName" required>
        </div>
        <div class="form-group">
          <label for="documentFile">File</label>
          <input type="file" id="documentFile" required>
        </div>
        <div class="form-group">
          <label for="documentType">Type</label>
          <select id="documentType" required>
            <option value="pdf">PDF</option>
            <option value="doc">Word Document</option>
            <option value="xls">Excel Spreadsheet</option>
            <option value="image">Image</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-primary">Upload</button>
          <button type="button" class="btn-secondary" onclick="closeModal('uploadDocumentModal')">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="assets/js/admin-dashboard.js"></script>
</body>
</html>
