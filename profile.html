<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit Profile - Holliday's Lawn & Garden</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="assets/css/main.css?v=1.0.1">
  <link rel="icon" type="image/png" href="assets/images/favicon/favicon-32x32.png" sizes="32x32">
  <link rel="icon" type="image/png" href="assets/images/favicon/favicon-16x16.png" sizes="16x16">
  <link rel="shortcut icon" href="assets/images/favicon/favicon.ico">
  <link rel="apple-touch-icon" href="assets/images/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/images/favicon/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="assets/images/favicon/icon-512.png">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f4f6f8;
      color: #222;
    }
    .profile-container {
      max-width: 800px;
      margin: 2rem auto;
      padding: 2rem;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }
    .profile-header {
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .profile-header h1 {
      color: #2e7d32;
      margin: 0;
    }
    .back-button {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: #f5f5f5;
      border: 1px solid #ddd;
      border-radius: 4px;
      color: #333;
      text-decoration: none;
      font-weight: 500;
      transition: all 0.2s ease;
    }
    .back-button:hover {
      background: #e0e0e0;
      border-color: #ccc;
    }
    .back-button i {
      font-size: 0.9em;
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: #333;
      font-weight: 500;
    }
    .form-group input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 1rem;
    }
    .address-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr;
      gap: 1rem;
    }
    .address-grid .form-group:first-child {
      grid-column: 1 / -1;
    }
    .action-button {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #2e7d32;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }
    .action-button:hover {
      background: #1b5e20;
    }
    .action-button i {
      font-size: 0.9em;
    }
    .notification {
      position: fixed;
      top: 1rem;
      right: 1rem;
      padding: 1rem;
      border-radius: 4px;
      color: #fff;
      font-weight: 500;
      z-index: 1000;
      animation: slideIn 0.3s ease-out;
    }
    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
    .notification.success {
      background: #2e7d32;
    }
    .notification.error {
      background: #c62828;
    }
  </style>
</head>
<body>
  <div class="profile-container">
    <div class="profile-header">
      <a href="customer-dashboard.html" class="back-button">
        <i class="fas fa-arrow-left"></i>
        Back to Dashboard
      </a>
      <h1>Edit Profile</h1>
    </div>
    <form id="profileForm" class="profile-form">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" required>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required readonly>
      </div>
      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" required>
      </div>
      <div class="address-grid">
        <div class="form-group">
          <label for="street">Street Address</label>
          <input type="text" id="street" name="street" required>
        </div>
        <div class="form-group">
          <label for="city">City</label>
          <input type="text" id="city" name="city" required>
        </div>
        <div class="form-group">
          <label for="state">State</label>
          <input type="text" id="state" name="state" maxlength="2" required>
        </div>
        <div class="form-group">
          <label for="zipCode">ZIP Code</label>
          <input type="text" id="zipCode" name="zipCode" pattern="[0-9]{5}" maxlength="5" required>
        </div>
      </div>
      <button type="submit" class="action-button">Save Changes</button>
    </form>
  </div>

  <script type="module">
    import { app } from './assets/js/firebase-config.js';
    import { 
      getAuth, 
      onAuthStateChanged 
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { 
      getFirestore, 
      doc, 
      getDoc, 
      updateDoc 
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const auth = getAuth(app);
    const db = getFirestore(app);

    // Check authentication state
    onAuthStateChanged(auth, user => {
      if (!user) {
        window.location.href = 'login.html';
        return;
      }
      loadUserProfile(user);
    });

    async function loadUserProfile(user) {
      try {
        const userDoc = await getDoc(doc(db, 'users', user.uid));
        if (userDoc.exists()) {
          const userData = userDoc.data();
          
          // Populate form fields
          document.getElementById('name').value = userData.displayName || userData.name || '';
          document.getElementById('email').value = user.email || '';
          document.getElementById('phone').value = userData.phone || '';
          document.getElementById('street').value = userData.street || '';
          document.getElementById('city').value = userData.city || '';
          document.getElementById('state').value = userData.state || '';
          document.getElementById('zipCode').value = userData.zipCode || '';
        }
      } catch (error) {
        console.error('Error loading profile:', error);
        showNotification('Error loading profile data', 'error');
      }
    }

    // Handle form submission
    document.getElementById('profileForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const user = auth.currentUser;
      if (!user) {
        showNotification('You must be logged in to update your profile', 'error');
        return;
      }

      try {
        const formData = {
          displayName: document.getElementById('name').value,
          phone: document.getElementById('phone').value,
          street: document.getElementById('street').value,
          city: document.getElementById('city').value,
          state: document.getElementById('state').value,
          zipCode: document.getElementById('zipCode').value,
          updatedAt: new Date()
        };

        await updateDoc(doc(db, 'users', user.uid), formData);
        showNotification('Profile updated successfully', 'success');
        
        // Update user's display name in Firebase Auth
        await user.updateProfile({
          displayName: formData.displayName
        });

        // Redirect back to dashboard after a short delay
        setTimeout(() => {
          window.location.href = 'customer-dashboard.html';
        }, 1500);
      } catch (error) {
        console.error('Error updating profile:', error);
        showNotification('Error updating profile', 'error');
      }
    });

    function showNotification(message, type = 'info') {
      const notification = document.createElement('div');
      notification.className = `notification ${type}`;
      notification.textContent = message;
      document.body.appendChild(notification);
      
      setTimeout(() => {
        notification.style.opacity = '0';
        notification.style.transform = 'translateX(100%)';
        setTimeout(() => notification.remove(), 300);
      }, 3000);
    }
  </script>
</body>
</html>
